name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend Image
        run: docker build -t midhun2710/devops-backend:latest ./backend

      - name: Push Backend Image
        run: docker push midhun2710/devops-backend:latest


  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Frontend Image
        run: docker build -t midhun2710/devops-frontend:latest ./frontend

      - name: Push Frontend Image
        run: docker push midhun2710/devops-frontend:latest


  worker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Worker Image
        run: docker build -t midhun2710/devops-worker:latest ./worker

      - name: Push Worker Image
        run: docker push midhun2710/devops-worker:latest